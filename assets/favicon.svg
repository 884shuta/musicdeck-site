<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="50%" stop-color="#DA70D6" />
      <stop offset="100%" stop-color="#FF1493" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#12121A" />
  <!-- Vinyl-like outer circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad)" stroke-width="12" opacity="0.3" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.5" stroke-dasharray="10, 15" />
  <!-- Inner deck circle -->
  <circle cx="256" cy="256" r="90" fill="#181824" stroke="url(#grad)" stroke-width="8" filter="url(#glow)" />
  <!-- Play button icon -->
  <polygon points="230,210 230,302 306,256" fill="url(#grad)" />
</svg>
